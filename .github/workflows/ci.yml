name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-test-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build and test
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          # PAT con read:packages para consumir el SDK desde MiniJuegosSdk
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew :buscaminas:assembleRelease :buscaminas:test :app:assembleDebug --no-daemon

      - name: Publish AAR to GitHub Packages
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISH_VERSION: "1.0.0-SNAPSHOT"
        run: ./gradlew :buscaminas:publishReleasePublicationToGitHubPackagesRepository --no-daemon --refresh-dependencies
